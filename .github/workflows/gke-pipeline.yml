name: GKE CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: project-c09883fa-34b7-476f-80e
  REGION: us-central1
  CLUSTER: lab-cluster
  ZONE: us-central1-a
  IMAGE: us-central1-docker.pkg.dev/project-c09883fa-34b7-476f-80e/ci-images/cli-coordinator-base
  WIF_PROVIDER: projects/475869006359/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  WIF_SA: github-deployer@project-c09883fa-34b7-476f-80e.iam.gserviceaccount.com
  GIT_SYNC: "git fetch --depth=1 origin ${{ github.sha }} && git reset --hard ${{ github.sha }}"

permissions:
  contents: read
  id-token: write

jobs:
  # ──────────────────────────────────────
  # Setup: Ensure NX cache PVC exists
  # ──────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: lab-cluster
          location: us-central1-a

      - name: Create NX cache PVC
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: nx-cache
          spec:
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 5Gi
          EOF

  # ──────────────────────────────────────
  # Job 1: Lint (light pool)
  # ──────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: lab-cluster
          location: us-central1-a

      - name: Submit lint job to GKE
        run: |
          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: lint-${{ github.run_id }}
          spec:
            ttlSecondsAfterFinished: 300
            backoffLimit: 0
            template:
              spec:
                nodeSelector:
                  workload: light
                containers:
                - name: lint
                  image: ${{ env.IMAGE }}:latest
                  command: ["sh", "-c", "${{ env.GIT_SYNC }} && npx nx run-many --target=lint --projects=app1 --parallel=2 --verbose"]
                  resources:
                    requests:
                      cpu: "250m"
                      memory: "512Mi"
                restartPolicy: Never
          EOF

      - name: Stream logs
        run: |
          echo "Waiting for pod to start..."
          kubectl wait --for=condition=ready pod -l job-name=lint-${{ github.run_id }} --timeout=300s
          echo "--- LINT LOGS ---"
          kubectl logs -f job/lint-${{ github.run_id }}

      - name: Verify job succeeded
        if: always()
        run: |
          kubectl wait --for=condition=complete job/lint-${{ github.run_id }} --timeout=30s && echo "Lint passed" || {
            echo "--- LINT FAILED ---"
            kubectl logs job/lint-${{ github.run_id }} || true
            exit 1
          }

  # ──────────────────────────────────────
  # Job 2: Unit tests (light pool)
  # ──────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: lab-cluster
          location: us-central1-a

      - name: Submit test job to GKE
        run: |
          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: test-${{ github.run_id }}
          spec:
            ttlSecondsAfterFinished: 300
            backoffLimit: 0
            template:
              spec:
                nodeSelector:
                  workload: light
                containers:
                - name: test
                  image: ${{ env.IMAGE }}:latest
                  command: ["sh", "-c", "${{ env.GIT_SYNC }} && npx nx run-many --target=test --projects=app1 --parallel=2 --verbose"]
                  resources:
                    requests:
                      cpu: "250m"
                      memory: "512Mi"
                restartPolicy: Never
          EOF

      - name: Stream logs
        run: |
          echo "Waiting for pod to start..."
          kubectl wait --for=condition=ready pod -l job-name=test-${{ github.run_id }} --timeout=300s
          echo "--- TEST LOGS ---"
          kubectl logs -f job/test-${{ github.run_id }}

      - name: Verify job succeeded
        if: always()
        run: |
          kubectl wait --for=condition=complete job/test-${{ github.run_id }} --timeout=30s && echo "Tests passed" || {
            echo "--- TESTS FAILED ---"
            kubectl logs job/test-${{ github.run_id }} || true
            exit 1
          }

  # ──────────────────────────────────────
  # Job 3: Build all libs (heavy pool, max parallel)
  # ──────────────────────────────────────
  build-libs:
    needs: [setup, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: lab-cluster
          location: us-central1-a

      - name: Submit libs build to GKE (heavy pool)
        run: |
          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: build-libs-${{ github.run_id }}
          spec:
            ttlSecondsAfterFinished: 300
            backoffLimit: 0
            template:
              spec:
                nodeSelector:
                  workload: heavy
                containers:
                - name: build
                  image: ${{ env.IMAGE }}:latest
                  command:
                  - sh
                  - -c
                  - |
                    ${{ env.GIT_SYNC }}
                    echo "--- Building all libs (parallel=10, heavy 6 CPU) ---"
                    npx nx run-many --target=build --exclude='app1,app2,app3,app4' --parallel=10 --verbose
                    echo "--- Libs build complete ---"
                  resources:
                    requests:
                      cpu: "5000m"
                      memory: "12Gi"
                  volumeMounts:
                  - name: nx-cache
                    mountPath: /app/.nx
                volumes:
                - name: nx-cache
                  persistentVolumeClaim:
                    claimName: nx-cache
                restartPolicy: Never
          EOF

      - name: Stream logs
        run: |
          echo "Waiting for pod to start..."
          kubectl wait --for=condition=ready pod -l job-name=build-libs-${{ github.run_id }} --timeout=300s
          echo "--- LIBS BUILD LOGS ---"
          kubectl logs -f job/build-libs-${{ github.run_id }}

      - name: Verify job succeeded
        if: always()
        run: |
          kubectl wait --for=condition=complete job/build-libs-${{ github.run_id }} --timeout=600s && echo "Libs build passed" || {
            echo "--- LIBS BUILD FAILED ---"
            kubectl logs job/build-libs-${{ github.run_id }} || true
            exit 1
          }

  # ──────────────────────────────────────
  # Job 4: Build all apps (heavy pool, after libs)
  # ──────────────────────────────────────
  build-apps:
    needs: [build-libs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: lab-cluster
          location: us-central1-a

      - name: Submit apps build to GKE (heavy pool)
        run: |
          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: build-apps-${{ github.run_id }}
          spec:
            ttlSecondsAfterFinished: 300
            backoffLimit: 0
            template:
              spec:
                nodeSelector:
                  workload: heavy
                containers:
                - name: build
                  image: ${{ env.IMAGE }}:latest
                  command:
                  - sh
                  - -c
                  - |
                    ${{ env.GIT_SYNC }}
                    echo "--- Building all apps (parallel=6, libs from NX cache) ---"
                    npx nx run-many --target=build --projects='app1,app2,app3,app4' --parallel=6 --verbose
                    echo "--- Apps build complete ---"
                  resources:
                    requests:
                      cpu: "5000m"
                      memory: "12Gi"
                  volumeMounts:
                  - name: nx-cache
                    mountPath: /app/.nx
                volumes:
                - name: nx-cache
                  persistentVolumeClaim:
                    claimName: nx-cache
                restartPolicy: Never
          EOF

      - name: Stream logs
        run: |
          echo "Waiting for pod to start..."
          kubectl wait --for=condition=ready pod -l job-name=build-apps-${{ github.run_id }} --timeout=300s
          echo "--- APPS BUILD LOGS ---"
          kubectl logs -f job/build-apps-${{ github.run_id }}

      - name: Verify job succeeded
        if: always()
        run: |
          kubectl wait --for=condition=complete job/build-apps-${{ github.run_id }} --timeout=600s && echo "Apps build passed" || {
            echo "--- APPS BUILD FAILED ---"
            kubectl logs job/build-apps-${{ github.run_id }} || true
            exit 1
          }

  # ──────────────────────────────────────
  # Job 5: Push production image
  # ──────────────────────────────────────
  push-image:
    needs: [build-apps]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build & push production image
        env:
          PROD_IMAGE: us-central1-docker.pkg.dev/project-c09883fa-34b7-476f-80e/ci-images/cli-coordinator-prod
        run: |
          echo "Building production image..."
          docker build \
            -t $PROD_IMAGE:${{ github.sha }} \
            -t $PROD_IMAGE:latest .

          echo "Pushing to Artifact Registry..."
          docker push --all-tags $PROD_IMAGE

          echo "Pushed: $PROD_IMAGE:${{ github.sha }}"

  # ──────────────────────────────────────
  # Job 6: Rebuild base image (on deps change)
  # ──────────────────────────────────────
  rebuild-base-image:
    if: contains(github.event.head_commit.modified, 'package-lock.json')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push new base image
        run: |
          docker build -f Dockerfile.ci-base \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest .
          docker push --all-tags ${{ env.IMAGE }}
