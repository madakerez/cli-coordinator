          if [ ! -f /tmp/tunnel/url.txt ]; then echo "ERROR: no tunnel URL"; exit 1; fi
          echo "COORDINATOR_URL=$(cat /tmp/tunnel/url.txt)" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Wait for app2 libs
        run: |
          echo "Polling coordinator for app2 readiness..."
          while true; do
            STATUS=$(curl -sf "${COORDINATOR_URL}/app-status?app=app2" 2>/dev/null) || { sleep 5; continue; }
            READY=$(echo "$STATUS" | jq -r '.ready')
            LIBS_READY=$(echo "$STATUS" | jq -r '.libsReady')
            LIBS_NEEDED=$(echo "$STATUS" | jq -r '.libsNeeded')
            echo "$(date +%H:%M:%S) app2: ${LIBS_READY}/${LIBS_NEEDED} libs ready"
            if [ "$READY" = "true" ]; then echo "✅ All libs for app2 are built!"; break; fi
            sleep 5
          done
        timeout-minutes: 30
      - name: Build app2
        run: npx nx build app2
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build-app2
          path: dist/apps/app2

  build-app3:
    name: "Build app3 (16 libs)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
