          path: dist/apps/app4

  # ─── Deploys: separate tile per app ───
  deploy-app1:
    name: "Deploy app1"
    needs: [build-app1]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-app1
          path: dist/
      - name: Deploy
        run: |
          echo "=== Deploying app1 ==="
          ls -la dist/
          echo "Uploading to https://app1.example.com..."
          sleep 2
          echo "✅ app1 deployed successfully!"

  deploy-app2:
    name: "Deploy app2"
    needs: [build-app2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-app2
