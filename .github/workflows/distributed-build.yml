name: Distributed Build

on: [push]

permissions:
  actions: read
  contents: read

env:
  NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
  NX_IGNORE_UNSUPPORTED_TS_SETUP: 'true'

jobs:
  # ─── Phase 1: Build all libraries (distributed via coordinator + agents) ───
  coordinator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: Install ngrok
        run: |
          curl -sSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz \
            | sudo tar xz -C /usr/local/bin
          ngrok config add-authtoken "$NGROK_AUTHTOKEN"

      - name: Start coordinator (libs only)
        run: npx tsx scripts/coordinator.ts &
        env:
          LIBS_ONLY: 'true'

      - name: Wait for coordinator health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8765/health && break || sleep 1
          done

      - name: Start ngrok tunnel
        run: |
          ngrok http 8765 --log=stdout &
          sleep 5
          for i in $(seq 1 10); do
            URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url // empty')
            if [ -n "$URL" ]; then break; fi
            sleep 2
          done
          if [ -z "$URL" ]; then echo "ERROR: ngrok tunnel failed"; exit 1; fi
          echo "Tunnel URL: $URL"
          mkdir -p /tmp/tunnel
          echo "$URL" > /tmp/tunnel/url.txt

      - name: Upload tunnel URL
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-url
          path: /tmp/tunnel/url.txt

      - name: Wait for all libs to be built
        run: |
          while true; do
            STATUS=$(curl -sf http://localhost:8765/status)
            PHASE=$(echo "$STATUS" | jq -r '.phase')
            echo "$(date +%H:%M:%S) $STATUS"
            if [ "$PHASE" = "complete" ]; then
              echo "All libs built!"
              curl -sf http://localhost:8765/timeline
              break
            fi
            sleep 10
          done
        timeout-minutes: 30

  agents:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: Wait for tunnel URL
        run: |
          for i in $(seq 1 60); do
            ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
              --jq '.artifacts[]? | select(.name=="tunnel-url") | .id // empty' 2>/dev/null) || true
            if [[ "$ARTIFACT_ID" =~ ^[0-9]+$ ]]; then
              echo "Found artifact ID: $ARTIFACT_ID"
              mkdir -p /tmp/tunnel
              gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" > /tmp/tunnel.zip
              unzip -o /tmp/tunnel.zip -d /tmp/tunnel
              break
            fi
            echo "Waiting for coordinator... ($i/60)"
            sleep 5
          done
          if [ ! -f /tmp/tunnel/url.txt ]; then
            echo "ERROR: Could not get coordinator URL"
            exit 1
          fi
          URL=$(cat /tmp/tunnel/url.txt)
          echo "COORDINATOR_URL=$URL" >> $GITHUB_ENV
          echo "Coordinator URL: $URL"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build libs
        run: npx tsx scripts/agent.ts
        env:
          AGENT_ID: agent-${{ matrix.agent }}

  # ─── Phase 2: Build applications (independent jobs, one per app) ───
  build-apps:
    needs: [coordinator, agents]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [app1, app2, app3, app4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: Build ${{ matrix.app }}
        run: npx nx build ${{ matrix.app }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.app }}
          path: dist/apps/${{ matrix.app }}

  # ─── Phase 3: Deploy (fake) ───
  deploy:
    needs: [build-apps]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [app1, app2, app3, app4]
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.app }}
          path: dist/

      - name: Deploy ${{ matrix.app }}
        run: |
          echo "=== Deploying ${{ matrix.app }} ==="
          echo "Checking build artifacts..."
          ls -la dist/
          echo "Uploading to https://${{ matrix.app }}.example.com..."
          sleep 2
          echo "Running health check..."
          sleep 1
          echo "✓ ${{ matrix.app }} deployed successfully!"
