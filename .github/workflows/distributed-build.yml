name: Distributed Build

on: [push]

permissions:
  actions: read
  contents: read

env:
  NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
  NX_IGNORE_UNSUPPORTED_TS_SETUP: 'true'

jobs:
  coordinator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: Install ngrok
        run: |
          curl -sSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz \
            | sudo tar xz -C /usr/local/bin
          ngrok config add-authtoken "$NGROK_AUTHTOKEN"

      - name: Start coordinator
        run: npx tsx scripts/coordinator.ts &

      - name: Wait for coordinator health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8765/health && break || sleep 1
          done

      - name: Start ngrok tunnel
        run: |
          ngrok http 8765 --log=stdout &
          sleep 5
          for i in $(seq 1 10); do
            URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url // empty')
            if [ -n "$URL" ]; then break; fi
            sleep 2
          done
          if [ -z "$URL" ]; then echo "ERROR: ngrok tunnel failed"; exit 1; fi
          echo "Tunnel URL: $URL"
          mkdir -p /tmp/tunnel
          echo "$URL" > /tmp/tunnel/url.txt

      - name: Upload tunnel URL
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-url
          path: /tmp/tunnel/url.txt

      - name: Wait for all tasks to complete
        run: |
          while true; do
            STATUS=$(curl -sf http://localhost:8765/status)
            LIBS_DONE=$(echo "$STATUS" | jq -r '.libs.done')
            LIBS_TOTAL=$(echo "$STATUS" | jq -r '.libs.total')
            APPS_DONE=$(echo "$STATUS" | jq -r '.apps.done')
            APPS_TOTAL=$(echo "$STATUS" | jq -r '.apps.total')
            DEPLOYS_DONE=$(echo "$STATUS" | jq -r '.deploys.done')
            DEPLOYS_TOTAL=$(echo "$STATUS" | jq -r '.deploys.total')
            RUNNING=$(echo "$STATUS" | jq -r '.running')
            echo "$(date +%H:%M:%S) | libs: ${LIBS_DONE}/${LIBS_TOTAL} | apps: ${APPS_DONE}/${APPS_TOTAL} | deploys: ${DEPLOYS_DONE}/${DEPLOYS_TOTAL} | running: ${RUNNING}"
            # Show per-app status
            echo "$STATUS" | jq -r '.appStatus[] | "  \(.name): \(.state) (libs: \(.libsReady)/\(.libsNeeded), deploy: \(.deployState))"'
            COMPLETE=$(echo "$STATUS" | jq -r '.complete')
            if [ "$COMPLETE" = "true" ]; then
              echo ""
              echo "=== ALL TASKS COMPLETE ==="
              curl -sf http://localhost:8765/timeline
              break
            fi
            sleep 10
          done
        timeout-minutes: 30

  agents:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: Wait for tunnel URL
        run: |
          for i in $(seq 1 60); do
            ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
              --jq '.artifacts[]? | select(.name=="tunnel-url") | .id // empty' 2>/dev/null) || true
            if [[ "$ARTIFACT_ID" =~ ^[0-9]+$ ]]; then
              echo "Found artifact ID: $ARTIFACT_ID"
              mkdir -p /tmp/tunnel
              gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" > /tmp/tunnel.zip
              unzip -o /tmp/tunnel.zip -d /tmp/tunnel
              break
            fi
            echo "Waiting for coordinator... ($i/60)"
            sleep 5
          done
          if [ ! -f /tmp/tunnel/url.txt ]; then
            echo "ERROR: Could not get coordinator URL"
            exit 1
          fi
          URL=$(cat /tmp/tunnel/url.txt)
          echo "COORDINATOR_URL=$URL" >> $GITHUB_ENV
          echo "Coordinator URL: $URL"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run agent (libs + apps + deploys)
        run: npx tsx scripts/agent.ts
        env:
          AGENT_ID: agent-${{ matrix.agent }}
