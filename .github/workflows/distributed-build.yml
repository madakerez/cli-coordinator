name: Distributed Build

on: [push]

permissions:
  actions: read
  contents: read

env:
  NX_IGNORE_UNSUPPORTED_TS_SETUP: 'true'

jobs:
  # ─── Build all libs: coordinator + local agents on one runner ───
  build-libs:
    name: "Build libs (coordinator + 4 agents)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: Build all 51 libs
        run: npx tsx scripts/test-local.ts
        env:
          NUM_AGENTS: '4'

      - name: Upload built libs + NX cache
        uses: actions/upload-artifact@v4
        with:
          name: libs-dist
          path: |
            dist/
            .nx/cache/

  # ─── App builds: download pre-built libs, build app only ───
  build-app1:
    name: "Build app1"
    needs: [build-libs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Download pre-built libs + NX cache
        uses: actions/download-artifact@v4
        with:
          name: libs-dist
      - name: Build app1
        run: npx nx build app1
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build-app1
          path: dist/apps/app1

  build-app2:
    name: "Build app2"
    needs: [build-libs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Download pre-built libs + NX cache
        uses: actions/download-artifact@v4
        with:
          name: libs-dist
      - name: Build app2
        run: npx nx build app2
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build-app2
          path: dist/apps/app2

  build-app3:
    name: "Build app3"
    needs: [build-libs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Download pre-built libs + NX cache
        uses: actions/download-artifact@v4
        with:
          name: libs-dist
      - name: Build app3
        run: npx nx build app3
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build-app3
          path: dist/apps/app3

  build-app4:
    name: "Build app4"
    needs: [build-libs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Download pre-built libs + NX cache
        uses: actions/download-artifact@v4
        with:
          name: libs-dist
      - name: Build app4
        run: npx nx build app4
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build-app4
          path: dist/apps/app4

  # ─── Deploys: separate tile per app ───
  deploy-app1:
    name: "Deploy app1"
    needs: [build-app1]
    runs-on: ubuntu-latest
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-app1
          path: dist/
      - name: Deploy
        run: |
          echo "=== Deploying app1 ==="
          ls -la dist/
          echo "Uploading to https://app1.example.com..."
          sleep 2
          echo "✅ app1 deployed successfully!"

  deploy-app2:
    name: "Deploy app2"
    needs: [build-app2]
    runs-on: ubuntu-latest
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-app2
          path: dist/
      - name: Deploy
        run: |
          echo "=== Deploying app2 ==="
          ls -la dist/
          echo "Uploading to https://app2.example.com..."
          sleep 2
          echo "✅ app2 deployed successfully!"

  deploy-app3:
    name: "Deploy app3"
    needs: [build-app3]
    runs-on: ubuntu-latest
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-app3
          path: dist/
      - name: Deploy
        run: |
          echo "=== Deploying app3 ==="
          ls -la dist/
          echo "Uploading to https://app3.example.com..."
          sleep 2
          echo "✅ app3 deployed successfully!"

  deploy-app4:
    name: "Deploy app4"
    needs: [build-app4]
    runs-on: ubuntu-latest
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-app4
          path: dist/
      - name: Deploy
        run: |
          echo "=== Deploying app4 ==="
          ls -la dist/
          echo "Uploading to https://app4.example.com..."
          sleep 2
          echo "✅ app4 deployed successfully!"
